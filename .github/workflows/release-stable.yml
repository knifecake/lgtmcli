name: Release (stable)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux musl tooling
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        id: package_unix
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          archive="lgtmcli-${version}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "${archive}" lgtmcli
          echo "archive=${archive}" >> "$GITHUB_OUTPUT"

      - name: Package (windows)
        if: runner.os == 'Windows'
        id: package_windows
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          $archive = "lgtmcli-$version-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/lgtmcli.exe" -DestinationPath $archive
          "archive=$archive" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package_unix.outputs.archive || steps.package_windows.outputs.archive }}
          path: ${{ steps.package_unix.outputs.archive || steps.package_windows.outputs.archive }}

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release files
        shell: bash
        run: |
          shopt -s nullglob
          mv dist/*/* .
          sha256sum lgtmcli-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            lgtmcli-*
            checksums.txt
          fail_on_unmatched_files: true
